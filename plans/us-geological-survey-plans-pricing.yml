specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: US Geological Survey
providerId: us-geological-survey
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Federal Government
  - Earth Science
  - Earthquakes
  - Water Data
  - Geospatial
description: USGS APIs (earthquake catalog, water data, geomagnetic, seismic design, ScienceBase, etc.) are free public services. There is no commercial pricing. Most endpoints do not require an API key, though some use api.data.gov fronting; high-volume consumers are directed to real-time feeds and bulk downloads rather than tight API polling.
sources:
  - https://www.usgs.gov/products/web-tools/apis
  - https://earthquake.usgs.gov/fdsnws/event/1/
plans:
  - id: us-geological-survey-public
    name: Public API Access
    type: freemium
    description: Free public access to USGS data services. No charge, no key required for most endpoints; some federated services route through api.data.gov and inherit its 1,000 req/hr per-key default.
    entries:
      - label: Public API Access
        name: public_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: FDSN Event Query Result Cap
        name: fdsn_event_query_cap
        type: quota
        metric: result
        limit: 20000
        timeFrame: usage
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: Earthquake Real-Time GeoJSON Feeds
      - name: FDSN Event Web Service (CSV / GeoJSON / QuakeML / KML / ATOM)
      - name: Water Data REST APIs
      - name: Geomagnetic Data Web Services
      - name: Seismic Design Data Web Services
      - name: ScienceBase APIs
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
