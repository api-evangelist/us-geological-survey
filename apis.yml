    type: OpenAPI
  description: The USGS Water Data OGC APIs provide OGC-compliant interfaces to USGS water data including real-time continuous
    measurements from automated sensor networks, daily summary values, field measurements, and monitoring location metadata.
    Covers streamflow, gage height, groundwater levels, water quality, and hundreds of other parameters. API key required.
    Legacy WaterServices decommissioning in Q1 2027.
