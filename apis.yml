  description: The USGS Earthquake Catalog API implements the FDSN Event Web Service Specification, providing real-time and
    historical access to global earthquake data from the USGS National Earthquake Information Center. Query by time, location,
    magnitude, depth, and other parameters. Returns data in GeoJSON, QuakeML, KML, CSV, or text formats. No authentication
    required.
- aid: us-geological-survey:water-data-api
