description: The US Geological Survey is a scientific agency of the United States government that conducts research on the
  natural resources, natural hazards, and environmental health of the United States. The USGS is responsible for monitoring
  and assessing the country's water, energy, mineral, and biological resources, as well as investigating geological hazards
  such as earthquakes, volcanoes, landslides, and floods. USGS provides a broad portfolio of public REST APIs covering earthquake
  data, water resources, geomagnetism, mapping, seismic design, and scientific data catalogs - all available without cost
  as US Government works.
