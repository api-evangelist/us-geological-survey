specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: US Geological Survey
providerId: us-geological-survey
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Federal Government
  - Earth Science
  - Rate Limiting
description: USGS does not publish a unified per-second/per-minute API rate-limit policy. The FDSN earthquake event service caps any individual query at 20,000 results (returning HTTP 400). Automated and high-volume consumers are explicitly directed to the real-time GeoJSON feeds rather than polling the query API. Endpoints that route through api.data.gov inherit its 1,000 req/hr per-key default.
sources:
  - https://earthquake.usgs.gov/fdsnws/event/1/
  - https://www.usgs.gov/products/web-tools/apis
  - https://api.data.gov/docs/developer-manual/
notes: USGS does not publish per-second request-rate limits for most services. Consumers should follow the documented operational guidance (use feeds, page results, avoid tight polling).
responseCodes:
  invalidQuery: 400
  throttled: 429
limits:
  - name: FDSN Event Query Result Cap
    scope: query
    metric: results_per_query
    limit: 20000
    notes: Queries that exceed 20,000 results return HTTP 400 Bad Request; page through the catalog or narrow time/space filters.
  - name: api.data.gov Fronted Endpoints
    scope: key
    metric: requests_per_hour
    limit: 1000
    timeFrame: hour
    notes: Applies to USGS endpoints that authenticate via api.data.gov; see api.data.gov documentation.
policies:
  - name: Prefer Real-Time Feeds
    description: USGS guidance is that automated applications should consume the real-time GeoJSON feeds rather than poll the query API for best performance and availability.
  - name: Bulk and Paging
    description: Use the offset parameter and time/space filters to page through large result sets while staying under the 20,000-result query cap.
  - name: Operator Discretion
    description: USGS reserves the ability to throttle abusive clients at the infrastructure layer; sustained high-rate scraping should be avoided.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
