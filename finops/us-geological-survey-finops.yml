description: 'FinOps shape for the U.S. Geological Survey: free public earth-science APIs (earthquakes, water, geomagnetism, ScienceBase). There is no commercial billing surface; FinOps focuses on stewardship of shared public infrastructure rather than dollar cost.'
sources:
  - https://www.usgs.gov/products/web-tools/apis
  - https://earthquake.usgs.gov/fdsnws/event/1/
billingModel:
  pricingCategory: Free Public Service
  billingFrequency: None
  billingCurrency: USD
  chargeCategories: []
focusColumns:
  ServiceName: USGS APIs
  ServiceCategory: Government Open Data
  ProviderName: U.S. Geological Survey
  PublisherName: U.S. Geological Survey
  InvoiceIssuerName: U.S. Geological Survey
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Requests to USGS web services; counted against api.data.gov per-key budget when fronted, otherwise unmetered
    unit: request
    aggregation: sum
    dimensions:
      - service
      - api_key
  - name: feed_pulls
    description: Real-time GeoJSON feed retrievals (recommended pattern for automated consumers)
    unit: request
    aggregation: sum
    dimensions:
      - feed
principles:
  - name: Visibility
    description: There is no USGS-issued usage dashboard; consumers monitor 400 (over 20K results) and 429 responses themselves and inspect api.data.gov rate-limit headers when applicable.
  - name: Allocation
    description: Allocate by application by issuing distinct api.data.gov API keys per team or app for endpoints that authenticate; for unauthenticated endpoints, use User-Agent identification.
  - name: Optimization
    description: Switch from polling to the real-time GeoJSON feeds; cache results client-side; page large queries to stay under the 20,000-result cap.
  - name: Accountability
    description: Owner is the application team; abusive polling can be throttled by USGS at the infrastructure layer, so monitoring 4xx/5xx response rates is the practical accountability signal.
maintainers:
