naftiko: 1.0.0-alpha2
info:
  label: USGS Water Data OGC API — Daily Values
  description: 'USGS Water Data OGC API — Daily Values. 1 operations. Lead operation: Query Daily Values. Self-contained Naftiko
    capability covering one Us Geological Survey business surface.'
  tags:
  - Us Geological Survey
  - Daily Values
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_GEOLOGICAL_SURVEY_API_KEY: US_GEOLOGICAL_SURVEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: usgs-water-data-daily-values
    baseUri: https://api.waterdata.usgs.gov/ogcapi/v0
    description: USGS Water Data OGC API — Daily Values business capability. Self-contained, no shared references.
    resources:
    - name: collections-daily-values-items
      path: /collections/daily-values/items
      operations:
      - name: querydailyvalues
        method: GET
        description: Query Daily Values
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: monitoringLocationIdentifier
          in: query
          type: string
          description: USGS monitoring location identifier
        - name: parameterCode
          in: query
          type: string
          description: USGS parameter code
        - name: statCode
          in: query
          type: string
          description: Statistical code (e.g., 00003 for mean, 00001 for max)
    authentication:
      type: apikey
      key: api_key
      value: '{{env.US_GEOLOGICAL_SURVEY_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: usgs-water-data-daily-values-rest
    port: 8080
    description: REST adapter for USGS Water Data OGC API — Daily Values. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/collections/daily-values/items
      name: collections-daily-values-items
      description: REST surface for collections-daily-values-items.
      operations:
      - method: GET
        name: querydailyvalues
        description: Query Daily Values
        call: usgs-water-data-daily-values.querydailyvalues
        with:
          monitoringLocationIdentifier: rest.monitoringLocationIdentifier
          parameterCode: rest.parameterCode
          statCode: rest.statCode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: usgs-water-data-daily-values-mcp
    port: 9090
    transport: http
    description: MCP adapter for USGS Water Data OGC API — Daily Values. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: query-daily-values
      description: Query Daily Values
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usgs-water-data-daily-values.querydailyvalues
      with:
        monitoringLocationIdentifier: tools.monitoringLocationIdentifier
        parameterCode: tools.parameterCode
        statCode: tools.statCode
      outputParameters:
      - type: object
        mapping: $.
